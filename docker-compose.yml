  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # # Frontend (Vite build -> nginx static)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   image: app-frontend:local
  #   container_name: app-frontend
  #   networks:
  #     - app-network
  #   labels:
  #     - traefik.enable=true
  #     - traefik.http.routers.frontend.rule=Host(`localhost`) || Host(`127.0.0.1`)
  #     - traefik.http.routers.frontend.entrypoints=web
  #     - traefik.http.routers.frontend.priority=1
  #     - traefik.http.services.frontend.loadbalancer.server.port=80
  #   restart: unless-stopped

  # # Backend (NestJS)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-backend
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NATS_SERVERS=nats://nats:4222
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
      # minio:
      #   condition: service_healthy
      # nats:
      #   condition: service_healthy
    networks:
      - app-network
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.backend.rule=(Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/api`)
    #   - traefik.http.routers.backend.entrypoints=web
    #   - traefik.http.routers.backend.priority=100
    #   - traefik.http.services.backend.loadbalancer.server.port=3000
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: app-postgres
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=ru_RU.utf8
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # Redis
  # redis:
  #   image: redis:7-alpine
  #   container_name: app-redis
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - ./redis_data:/data
