name: DSP Consistency Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  dsp-check:
    name: DSP Graph Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect DSP CLI
        id: detect-cli
        run: |
          CLI=""
          for p in .cursor .claude .codex; do
            if [ -f "$p/skills/data-structure-protocol/scripts/dsp-cli.py" ]; then
              CLI="python $p/skills/data-structure-protocol/scripts/dsp-cli.py"
              echo "cli=$CLI" >> "$GITHUB_OUTPUT"
              echo "Found DSP CLI at: $p/skills/data-structure-protocol/scripts/dsp-cli.py"
              break
            fi
          done
          if [ -z "$CLI" ]; then
            echo "DSP CLI not found, skipping checks"
            echo "cli=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check DSP directory exists
        if: steps.detect-cli.outputs.cli != ''
        id: check-dsp
        run: |
          if [ -d ".dsp" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No .dsp directory found, skipping checks"
          fi

      - name: DSP Graph Stats
        if: steps.detect-cli.outputs.cli != '' && steps.check-dsp.outputs.exists == 'true'
        run: |
          echo "## DSP Graph Statistics"
          ${{ steps.detect-cli.outputs.cli }} --root . get-stats

      - name: Verify reverse-index cache is committed and up to date
        if: steps.detect-cli.outputs.cli != '' && steps.check-dsp.outputs.exists == 'true'
        run: |
          echo "## Reverse-index Cache Check"
          # The committed .dsp/.cache must match a fresh rebuild. A mismatch means
          # it is stale or missing (e.g. a merge/rebase touched .dsp/, or it was
          # hand-edited, or the cache was never committed).
          ${{ steps.detect-cli.outputs.cli }} --root . rebuild-cache
          CHANGES="$(git status --porcelain -- .dsp/.cache)"
          if [ -n "$CHANGES" ]; then
            echo "::error::.dsp/.cache is stale, missing, or uncommitted. Run 'dsp-cli rebuild-cache' and commit .dsp/.cache."
            echo "$CHANGES"
            exit 1
          fi
          echo "Reverse-index cache matches a fresh rebuild."

      - name: Check for orphans
        if: steps.detect-cli.outputs.cli != '' && steps.check-dsp.outputs.exists == 'true'
        run: |
          echo "## Orphan Check"
          result=$(${{ steps.detect-cli.outputs.cli }} --root . get-orphans 2>&1 || true)
          echo "$result"
          if echo "$result" | grep -q "^obj-\|^func-"; then
            echo "::warning::DSP orphaned entities detected. Consider running remove-entity or adding imports."
          fi

      - name: Check for cycles
        if: steps.detect-cli.outputs.cli != '' && steps.check-dsp.outputs.exists == 'true'
        run: |
          echo "## Cycle Check"
          result=$(${{ steps.detect-cli.outputs.cli }} --root . detect-cycles 2>&1 || true)
          echo "$result"
          if echo "$result" | grep -q "^cycle"; then
            echo "::warning::DSP circular dependencies detected. Review import graph."
          fi

      - name: Check changed files against DSP (PR only)
        if: github.event_name == 'pull_request' && steps.detect-cli.outputs.cli != '' && steps.check-dsp.outputs.exists == 'true'
        run: |
          echo "## Changed Files DSP Check"
          CLI="${{ steps.detect-cli.outputs.cli }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          WARNINGS=0

          # find-by-source prints "not found" to stdout on a miss, so both
          # the output marker and emptiness must be checked.
          for file in $(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD); do
            case "$file" in
              *.ts|*.tsx|*.js|*.jsx|*.py|*.go|*.rs|*.java|*.rb|*.vue|*.svelte)
                result=$($CLI --root . find-by-source "$file" 2>/dev/null || true)
                if [[ -z "$result" || "$result" == *"not found"* ]]; then
                  echo "::warning file=$file::New/modified file not registered in DSP: $file"
                  WARNINGS=$((WARNINGS + 1))
                fi
                ;;
            esac
          done

          for file in $(git diff --name-only --diff-filter=D "$BASE_SHA"...HEAD); do
            result=$($CLI --root . find-by-source "$file" 2>/dev/null || true)
            if [[ -n "$result" && "$result" != *"not found"* ]]; then
              echo "::warning file=$file::Deleted file still registered in DSP: $file (entity: $result)"
              WARNINGS=$((WARNINGS + 1))
            fi
          done

          if [ "$WARNINGS" -gt 0 ]; then
            echo "Found $WARNINGS DSP consistency warnings"
          else
            echo "All changed files are consistent with DSP graph"
          fi
